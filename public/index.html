<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- PWA -->
    <meta name="theme-color" content="#070710" />
    <meta
      name="description"
      content="Lumina AI - Your intelligent AI assistant for fast, accurate, and insightful conversations."
    />

    <!-- Mobile PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Lumina AI" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/whisper-flow-logo.png" />
    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/whisper-flow-logo.png"
    />

    <!-- Theme -->
    <script>
      (function () {
        var t = localStorage.getItem("lumina-theme") || "dark";
        document.documentElement.classList.add(t);
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />

    <title>Lumina AI</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run Lumina AI.</noscript>

    <div id="root"></div>
  </body>
</html>
